<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexusLink Ultra</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .emoji-panel { display: none; bottom: 80px; right: 20px; z-index: 100; }
        @media (max-width: 768px) { .mobile-hidden { display: none !important; } .mobile-full { width: 100% !important; position: fixed; inset: 0; z-index: 40; } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0f172a] p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-sm text-center">
            <h1 class="text-3xl font-black italic mb-6">NEXUS<span class="text-blue-500">LINK</span></h1>
            <input id="in-nick" type="text" placeholder="Ник" class="w-full bg-slate-900 mb-3 rounded-xl px-4 py-3 text-white outline-none border border-slate-700">
            <input id="in-id" type="text" placeholder="ID" class="w-full bg-slate-900 mb-3 rounded-xl px-4 py-3 text-white outline-none border border-slate-700">
            <input id="in-pass" type="password" placeholder="Пароль" class="w-full bg-slate-900 mb-6 rounded-xl px-4 py-3 text-white outline-none border border-slate-700">
            <button onclick="auth()" class="w-full bg-blue-600 py-4 rounded-xl font-black shadow-lg hover:bg-blue-500 transition">ВОЙТИ</button>
        </div>
    </div>

    <div id="app-screen" class="hidden h-screen flex overflow-hidden">
        <div id="sidebar" class="w-full md:w-80 bg-slate-950 border-r border-slate-900 flex flex-col">
            <div class="p-4 flex justify-between items-center border-b border-slate-900">
                <span class="font-black italic text-xl text-blue-500">NEXUS</span>
                <button onclick="alert('Ваш ID: ' + me.id)" class="text-slate-500 hover:text-white"><i class="fas fa-cog"></i></button>
            </div>
            <div class="p-3">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-3 text-slate-500 text-xs"></i>
                    <input id="u-search" oninput="renderContacts(this.value)" type="text" placeholder="Поиск по ID..." class="w-full bg-slate-900 rounded-xl pl-9 py-2 text-xs outline-none border border-slate-800">
                </div>
            </div>
            <div id="user-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <div onclick="switchChat('global')" id="btn-global" class="p-4 bg-blue-600/10 rounded-xl cursor-pointer flex items-center mb-2 border-l-4 border-blue-500">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center mr-3"><i class="fas fa-globe"></i></div>
                    <p class="font-bold text-sm">Global Chat</p>
                </div>
                <div id="contacts"></div>
            </div>
        </div>

        <div id="chat-window" class="mobile-hidden flex-1 flex flex-col bg-[#0b0e14] relative">
            <div class="p-3 glass flex items-center justify-between border-b border-slate-800">
                <div class="flex items-center">
                    <button onclick="closeChat()" class="md:hidden mr-3"><i class="fas fa-arrow-left"></i></button>
                    <div id="chat-avatar" class="w-9 h-9 bg-blue-600 rounded-full flex items-center justify-center mr-3 text-xs font-bold shadow-lg">G</div>
                    <h2 id="chat-title" class="font-bold text-sm">Global Chat</h2>
                </div>
                <div class="flex gap-4 px-2">
                    <button onclick="alert('Звонок...')"><i class="fas fa-phone text-slate-500 hover:text-blue-500"></i></button>
                    <button onclick="alert('Видео...')"><i class="fas fa-video text-slate-500 hover:text-blue-500"></i></button>
                </div>
            </div>

            <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

            <div id="emoji-box" class="emoji-panel absolute glass p-4 rounded-2xl grid grid-cols-6 gap-3 shadow-2xl border border-blue-500/30">
                <span onclick="addEmoji('😊')" class="cursor-pointer hover:scale-125 transition">😊</span>
                <span onclick="addEmoji('😂')" class="cursor-pointer hover:scale-125 transition">😂</span>
                <span onclick="addEmoji('🔥')" class="cursor-pointer hover:scale-125 transition">🔥</span>
                <span onclick="addEmoji('❤️')" class="cursor-pointer hover:scale-125 transition">❤️</span>
                <span onclick="addEmoji('💀')" class="cursor-pointer hover:scale-125 transition">💀</span>
                <span onclick="addEmoji('👍')" class="cursor-pointer hover:scale-125 transition">👍</span>
            </div>

            <div class="p-4">
                <form id="msg-form" class="max-w-4xl mx-auto flex gap-2 glass p-2 rounded-2xl border border-slate-800">
                    <button type="button" onclick="document.getElementById('file-input').click()" class="px-3 text-slate-500 hover:text-blue-500"><i class="fas fa-paperclip"></i></button>
                    <input id="file-input" type="file" class="hidden" accept="image/*">
                    <input id="m-input" autocomplete="off" placeholder="Напишите сообщение..." class="flex-1 bg-transparent px-2 text-sm outline-none text-white">
                    <button type="button" onclick="toggleEmoji()" class="px-2 text-slate-500 hover:text-yellow-500"><i class="far fa-smile"></i></button>
                    <button class="bg-blue-600 w-12 h-10 rounded-xl flex items-center justify-center hover:bg-blue-500 transition shadow-lg"><i class="fas fa-paper-plane text-xs"></i></button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let me = { nick: '', id: '', color: '' };
        let activeChat = 'global';
        let onlineUsers = {};

        function auth() {
            const nick = document.getElementById('in-nick').value;
            const id = document.getElementById('in-id').value;
            if (nick && id) socket.emit('auth request', { nick, id });
        }

        socket.on('auth success', (data) => {
            me = data;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
        });

        socket.on('update users', (users) => {
            onlineUsers = users;
            renderContacts();
        });

        function renderContacts(f = '') {
            const cont = document.getElementById('contacts'); cont.innerHTML = '';
            for (let id in onlineUsers) {
                if (id === me.id || (f && !id.toLowerCase().includes(f.toLowerCase()))) continue;
                const u = onlineUsers[id];
                const d = document.createElement('div');
                d.className = `p-4 rounded-xl cursor-pointer flex items-center mb-1 transition ${activeChat === id ? 'bg-blue-600/20 border-l-4 border-blue-500' : 'hover:bg-slate-900'}`;
                d.onclick = () => switchChat(id);
                d.innerHTML = `<div class="w-10 h-10 rounded-full flex items-center justify-center mr-3 font-bold text-white shadow-md" style="background:${u.color}">${u.nick[0].toUpperCase()}</div><div><p class="text-sm font-bold text-white">${u.nick}</p><p class="text-[9px] opacity-40 font-mono italic">ID: ${id}</p></div>`;
                cont.appendChild(d);
            }
        }

        function switchChat(target) {
            activeChat = target;
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('mobile-hidden');
                document.getElementById('chat-window').classList.remove('mobile-hidden');
                document.getElementById('chat-window').classList.add('mobile-full');
            }
            document.getElementById('messages').innerHTML = '';
            const title = document.getElementById('chat-title');
            const avatar = document.getElementById('chat-avatar');
            if (target === 'global') {
                title.innerText = "Global Chat"; avatar.innerText = "G"; avatar.style.backgroundColor = "#2563eb";
            } else {
                const u = onlineUsers[target];
                title.innerText = u.nick; avatar.innerText = u.nick[0].toUpperCase(); avatar.style.backgroundColor = u.color;
            }
            socket.emit('auth request', { nick: me.nick, id: me.id }); // Просим историю
            renderContacts();
        }

        function closeChat() {
            document.getElementById('sidebar').classList.remove('mobile-hidden');
            document.getElementById('chat-window').classList.add('mobile-hidden');
        }

        function toggleEmoji() {
            const box = document.getElementById('emoji-box');
            box.style.display = box.style.display === 'grid' ? 'none' : 'grid';
        }

        function addEmoji(e) {
            document.getElementById('m-input').value += e;
            toggleEmoji();
        }

        socket.on('load history', (h) => {
            const box = document.getElementById('messages'); box.innerHTML = '';
            h.forEach(m => {
                if (m.to === activeChat || (m.to === me.id && m.id === activeChat) || (m.id === me.id && m.to === activeChat)) displayMessage(m);
            });
        });

        document.getElementById('msg-form').onsubmit = (e) => {
            e.preventDefault();
            const inp = document.getElementById('m-input');
            if (inp.value.trim()) {
                socket.emit('chat message', { user: me.nick, id: me.id, to: activeChat, text: inp.value, type: 'text' });
                inp.value = '';
            }
        };

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            const r = new FileReader();
            r.onload = (ev) => socket.emit('chat message', { user: me.nick, id: me.id, to: activeChat, text: ev.target.result, type: 'image' });
            r.readAsDataURL(file);
        };

        socket.on('chat message', (m) => {
            if (m.to === activeChat || (m.to === me.id && m.id === activeChat) || (m.id === me.id && m.to === activeChat)) displayMessage(m);
        });

        function displayMessage(m) {
            const isMe = m.id === me.id;
            const box = document.getElementById('messages');
            const d = document.createElement('div');
            d.className = `flex ${isMe ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-1`;
            let content = m.type === 'image' ? `<img src="${m.text}" class="rounded-xl max-w-full shadow-lg border border-white/10">` : `<p class="text-sm">${m.text}</p>`;
            d.innerHTML = `<div class="max-w-[85%] md:max-w-[70%]"><p class="text-[9px] opacity-40 mb-1 px-1 ${isMe ? 'text-right' : ''}">${m.user} • ${m.time}</p><div class="${isMe ? 'bg-blue-600 shadow-blue-900/20' : 'bg-slate-800 border border-slate-700'} px-4 py-2.5 rounded-2xl shadow-xl">${content}</div></div>`;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
