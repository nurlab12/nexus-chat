<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexusLink v3.5</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0e14; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .settings-screen { transform: translateX(100%); transition: 0.3s ease; position: fixed; inset: 0; background: #0b0e14; z-index: 100; }
        .settings-active { transform: translateX(0); }
        .msg-container:hover .del-icon { opacity: 1; }
        .del-icon { opacity: 0; transition: 0.2s; cursor: pointer; color: #ef4444; }
        @media (max-width: 768px) { .mobile-hide { display: none; } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="auth-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-[#0b0e14] p-4">
        <div class="glass p-8 rounded-[40px] w-full max-w-sm text-center">
            <h1 class="text-3xl font-black italic mb-6">NEXUS<span class="text-blue-500">LINK</span></h1>
            <div id="auth-error" class="text-red-500 text-xs mb-4 hidden"></div>
            <input id="in-nick" type="text" placeholder="Ваш Ник" class="w-full bg-slate-900 rounded-2xl px-5 py-4 mb-3 outline-none border border-white/5">
            <input id="in-id" type="text" placeholder="Уникальный ID" class="w-full bg-slate-900 rounded-2xl px-5 py-4 mb-3 outline-none border border-white/5">
            <input id="in-pass" type="password" placeholder="Пароль" class="w-full bg-slate-900 rounded-2xl px-5 py-4 mb-8 outline-none border border-white/5">
            <button onclick="auth()" class="w-full bg-blue-600 py-4 rounded-2xl font-black shadow-lg shadow-blue-900/20 active:scale-95 transition">ВОЙТИ / СОЗДАТЬ</button>
        </div>
    </div>

    <div id="app-screen" class="hidden h-screen flex">
        <div id="sidebar" class="w-full md:w-80 border-r border-white/5 flex flex-col">
            <div class="p-5 flex justify-between items-center">
                <span class="text-xl font-black italic text-blue-500">NEXUS</span>
                <button onclick="toggleSettings()"><i class="fas fa-bars"></i></button>
            </div>
            <div id="contacts" class="flex-1 overflow-y-auto p-2 space-y-1">
                <div onclick="switchChat('global')" id="chat-global" class="p-4 rounded-2xl cursor-pointer flex items-center bg-blue-600/10 border-l-4 border-blue-500">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center mr-3"><i class="fas fa-globe"></i></div>
                    <p class="font-bold text-sm">Global Chat</p>
                </div>
                <div id="user-list"></div>
            </div>
        </div>

        <div id="chat-window" class="mobile-hide flex-1 flex flex-col bg-[#0b0e14]">
            <div class="p-4 glass flex items-center justify-between border-b border-white/5">
                <div class="flex items-center gap-3">
                    <button onclick="closeChat()" class="md:hidden"><i class="fas fa-arrow-left"></i></button>
                    <div id="chat-avatar" class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold">G</div>
                    <h2 id="chat-title" class="font-bold text-sm">Global Chat</h2>
                </div>
            </div>
            <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            <form id="msg-form" class="p-4 max-w-4xl mx-auto w-full flex gap-2">
                <div class="flex-1 glass flex items-center px-4 py-2 rounded-2xl">
                    <button type="button" onclick="document.getElementById('file-input').click()" class="text-slate-500 mr-3"><i class="fas fa-paperclip"></i></button>
                    <input id="file-input" type="file" class="hidden" accept="image/*">
                    <input id="m-input" autocomplete="off" placeholder="Сообщение..." class="flex-1 bg-transparent text-sm outline-none">
                </div>
                <button class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <script>
        const socket = io();
        let me = { nick: '', id: '', avatar: '' };
        let activeChat = 'global';
        let onlineUsers = {};
        let messageCache = []; // Кэш сообщений для мгновенного переключения

        function auth() {
            const nick = document.getElementById('in-nick').value.trim();
            const id = document.getElementById('in-id').value.trim();
            const password = document.getElementById('in-pass').value.trim();
            if (nick && id && password) {
                socket.emit('auth request', { nick, id, password });
            }
        }

        socket.on('auth error', (err) => {
            const errDiv = document.getElementById('auth-error');
            errDiv.innerText = err;
            errDiv.classList.remove('hidden');
        });

        socket.on('auth success', (data) => {
            me = data;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
        });

        socket.on('update users', (users) => {
            onlineUsers = users;
            renderContacts();
        });

        function renderContacts() {
            const cont = document.getElementById('user-list');
            cont.innerHTML = '';
            for (let id in onlineUsers) {
                if (id === me.id) continue;
                const u = onlineUsers[id];
                const av = u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : u.nick[0];
                cont.innerHTML += `<div onclick="switchChat('${id}')" class="p-4 rounded-2xl cursor-pointer flex items-center ${activeChat === id ? 'bg-blue-600/20' : 'hover:bg-white/5'}">
                    <div class="w-10 h-10 rounded-full overflow-hidden bg-blue-600 flex items-center justify-center mr-3 font-bold">${av}</div>
                    <div><p class="text-sm font-bold">${u.nick}</p></div>
                </div>`;
            }
        }

        function switchChat(t) {
            activeChat = t;
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('mobile-hide');
                document.getElementById('chat-window').classList.remove('mobile-hide');
            }
            
            // Мгновенная отрисовка из кэша
            renderMessages();
            
            const title = document.getElementById('chat-title');
            const avatar = document.getElementById('chat-avatar');
            if (t === 'global') {
                title.innerText = "Global Chat";
                avatar.innerHTML = 'G';
            } else {
                const u = onlineUsers[t];
                title.innerText = u ? u.nick : t;
                avatar.innerHTML = u && u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : (u ? u.nick[0] : '?');
            }
        }

        socket.on('load history', (h) => {
            messageCache = h;
            renderMessages();
        });

        socket.on('chat message', (m) => {
            messageCache.push(m);
            if (m.to === activeChat || m.id === activeChat || (m.to === me.id && m.id === activeChat)) {
                displayMessage(m);
            }
        });

        function renderMessages() {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            const filtered = messageCache.filter(m => 
                (activeChat === 'global' && m.to === 'global') ||
                (m.to === activeChat && m.id === me.id) ||
                (m.to === me.id && m.id === activeChat)
            );
            filtered.forEach(displayMessage);
        }

        function displayMessage(m) {
            const isMe = m.id === me.id;
            const box = document.getElementById('messages');
            const d = document.createElement('div');
            d.id = `msg-${m._id}`;
            d.className = `flex ${isMe ? 'justify-end' : 'justify-start'} mb-2 msg-container`;
            
            const av = m.avatar ? `<img src="${m.avatar}" class="w-6 h-6 rounded-full object-cover">` : `<div class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center text-[10px]">${m.user[0]}</div>`;
            
            d.innerHTML = `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[80%]">
                <div class="flex items-center gap-2 mb-1">
                    ${!isMe ? av : ''} <span class="text-[10px] opacity-50">${m.user}</span> ${isMe ? av : ''}
                </div>
                <div class="flex items-center gap-2">
                    ${isMe ? `<i onclick="deleteMsg('${m._id}')" class="fas fa-trash-alt del-icon text-[10px]"></i>` : ''}
                    <div class="${isMe ? 'bg-blue-600' : 'bg-slate-800'} px-4 py-2 rounded-2xl text-sm">
                        ${m.text.startsWith('data:image') ? `<img src="${m.text}" class="rounded-lg">` : m.text}
                    </div>
                </div>
            </div>`;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        function deleteMsg(id) { 
            if(confirm("Удалить?")) socket.emit('delete message', id); 
        }

        socket.on('message deleted', (id) => {
            messageCache = messageCache.filter(m => m._id !== id);
            const el = document.getElementById(`msg-${id}`);
            if (el) el.remove();
        });

        document.getElementById('msg-form').onsubmit = (e) => {
            e.preventDefault();
            const inp = document.getElementById('m-input');
            if (inp.value.trim()) {
                socket.emit('chat message', { user: me.nick, id: me.id, to: activeChat, text: inp.value });
                inp.value = '';
            }
        };

        document.getElementById('file-input').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => socket.emit('chat message', { user: me.nick, id: me.id, to: activeChat, text: ev.target.result });
            r.readAsDataURL(e.target.files[0]);
        };

        function closeChat() {
            document.getElementById('sidebar').classList.remove('mobile-hide');
            document.getElementById('chat-window').classList.add('mobile-hide');
        }
    </script>
</body>
</html>
